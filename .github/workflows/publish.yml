name: Publish to PSGallery

on:
  release:
    types: [published]   # trigger khi tạo Release trên GitHub UI

jobs:
  publish:
    runs-on: windows-latest   # bắt buộc Windows vì PnP.PowerShell

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name PnP.PowerShell                 -Scope CurrentUser -Force -AllowClobber
          Install-Module -Name Microsoft.Graph.Authentication -Scope CurrentUser -Force
          Install-Module -Name Pester                         -Scope CurrentUser -Force -MinimumVersion 5.0.0

      - name: Validate module manifest
        shell: pwsh
        run: Test-ModuleManifest -Path ./SPClean.psd1

      - name: Run unit tests (publish gate)
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path         = './Tests/Unit'   # Unit only — integration tests need live tenant env vars
          $config.Run.PassThru     = $true
          $config.Output.Verbosity = 'Minimal'
          $result = Invoke-Pester -Configuration $config
          if ($result.PassedCount -lt 120) {
              Write-Error "Publish blocked: only $($result.PassedCount)/130 tests passed (minimum 120)."
              exit 1
          }
          exit 0

      - name: Inject license secret
        shell: pwsh
        env:
          SPCLEAN_SECRET_KEY: ${{ secrets.SPCLEAN_SECRET_KEY }}
        run: |
          .\tools\Inject-Secret.ps1 `
              -SourceFile .\Private\LicenseManager.ps1 `
              -OutputFile .\Private\LicenseManager.ps1

      - name: Remove .git folder before packaging
        shell: pwsh
        run: Remove-Item -Recurse -Force .git -ErrorAction SilentlyContinue

      - name: Publish to PSGallery
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          Publish-PSResource -Path . -ApiKey $env:PSGALLERY_API_KEY -Repository PSGallery -Verbose
